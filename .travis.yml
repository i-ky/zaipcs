language: c
compiler:
- clang
- gcc
dist: xenial
env:
- BRANCH=master
- BRANCH=release/4.0
- BRANCH=release/3.0
before_script:
- git clone https://git.zabbix.com/scm/zbx/zabbix.git --depth 1 --single-branch --branch $BRANCH
- cd zabbix
- ./bootstrap.sh
- ./configure --enable-agent
- make
- cd -
script:
- ZABBIX_SOURCE=zabbix CFLAGS='-Wall -Wextra -Wpedantic -g -O2' make
- export AGENT=zabbix/src/zabbix_agent/zabbix_agentd
- export CONFIG=zabbix/conf/zabbix_agentd.conf
- echo "LoadModulePath=$PWD" >> $CONFIG
- echo 'LoadModule=zaipcs.so' >> $CONFIG
- diff --unified --label expected tests.txt --label actual <(for KEY in $(cut --delimiter ' ' --fields 1 tests.txt); do $AGENT --config $CONFIG --test $KEY; done)
